---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: groups.lights.homelab.internal
spec:
  group: lights.homelab.internal
  names:
    kind: Group
    listKind: GroupList
    plural: groups
    singular: group
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.lightCount
      name: Lights
      type: integer
    - jsonPath: .status.missingLights
      name: Missing
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Group is a user-named collection of Lights, for other resources (switch
          bindings, future circadian schedules) to target instead of enumerating
          individual Lights each time. Cluster scoped like Light/Switch/HueBridge,
          but metadata.name is user-chosen (e.g. "living-room") rather than a
          stable Hue UUID - a Group has no Hue-side identity at all.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GroupSpec is the user-declared list of Lights belonging to
              this group.
            properties:
              lights:
                description: Lights are the names of Light CRs that belong to this
                  group.
                items:
                  type: string
                type: array
            type: object
          status:
            description: |-
              GroupStatus reports which of Spec.Lights don't currently resolve to a
              Light CR - a typo'd or since-deleted reference would otherwise be silent.
            properties:
              lastSynced:
                description: LastSynced is when this status was last recomputed.
                format: date-time
                type: string
              lightCount:
                description: |-
                  LightCount is len(Spec.Lights) - kept in Status (rather than only
                  computed client-side) purely so kubectl can print it as a column:
                  a CRD printer column's JSONPath can only select an existing field,
                  not derive one (e.g. no len()), so there's nowhere else to source
                  this from.
                format: int32
                type: integer
              missingLights:
                description: |-
                  MissingLights are entries in Spec.Lights that don't currently match
                  any Light CR name.
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
