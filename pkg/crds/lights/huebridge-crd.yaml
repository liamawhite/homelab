---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: huebridges.lights.homelab.internal
spec:
  group: lights.homelab.internal
  names:
    kind: HueBridge
    listKind: HueBridgeList
    plural: huebridges
    singular: huebridge
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.name
      name: Name
      type: string
    - jsonPath: .status.ip
      name: IP
      type: string
    - jsonPath: .status.reachable
      name: Reachable
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          HueBridge represents a single Hue bridge's live-resolved network
          location, maintained by hub-controller (see
          applications/lights-controller/cmd/hub-controller) so lights-controller
          can reach it without doing its own discovery. Cluster scoped, same
          reasoning as Light. Named after the bridge's stable Hue ID (matches
          config.HueBridgeConfig.ID and Light.status.bridgeId values).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              HueBridgeSpec is deliberately empty - see LightSpec's doc comment for
              why.
            type: object
          status:
            description: |-
              HueBridgeStatus mirrors
              github.com/liamawhite/homelab/pkg/lights/hue.Bridge, plus
              Reachable/LastResolved which that type has no notion of.
            properties:
              apiVersion:
                description: APIVersion is the bridge's CLIP API version.
                type: string
              ip:
                description: |-
                  IP is the bridge's current LAN address, re-resolved by
                  hub-controller whenever it changes (e.g. a new DHCP lease) - this
                  is the whole point of this CRD: a durable, inspectable answer to
                  "where is this bridge right now."
                type: string
              lastResolved:
                description: LastResolved is when this status was last successfully
                  updated.
                format: date-time
                type: string
              mac:
                description: MAC is the bridge's MAC address.
                type: string
              modelId:
                description: ModelID is the bridge's model, e.g. "BSB002".
                type: string
              name:
                description: Name is the bridge's own display name, e.g. "Hue Bridge".
                type: string
              reachable:
                description: |-
                  Reachable is false when the most recent discovery round didn't
                  find this bridge - the rest of this status is then stale, left as
                  of the last successful resolution rather than cleared.
                type: boolean
              swVersion:
                description: SWVersion is the bridge's firmware version.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
